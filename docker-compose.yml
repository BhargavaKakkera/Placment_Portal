services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: placement_portal_app
    env_file:
      - .env
    environment:
      APP_BASE_URL: http://localhost:8000
      PORT: "8000"
      PYTHONUNBUFFERED: "1"
    ports:
      - "8000:8000"
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/docs').read()\""]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 30s
