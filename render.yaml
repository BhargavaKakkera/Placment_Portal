services:
  - type: web
    name: placement-portal
    runtime: docker
    plan: free

    envVars:
      - key: DEBUG
        value: "false"

      - key: LOG_LEVEL
        value: INFO

      - key: EXPOSE_TOKENS_IN_RESPONSES
        value: "false"

      - key: ENABLE_EMAIL_DELIVERY
        value: "true"

      - key: EMAIL_PROVIDER
        value: resend

      - key: EMAIL_FROM
        sync: false

      - key: RESEND_API_KEY
        sync: false

      - key: APP_BASE_URL
        sync: false

      - key: DATABASE_URL
        sync: false

      - key: SECRET_KEY
        sync: false

      - key: JWT_SECRET_KEY
        sync: false

      - key: SESSION_SECRET_KEY
        sync: false
