services:
  - type: web
    name: placement-portal
    runtime: docker
    plan: free

    envVars:
      - key: DEBUG
        value: "false"

      - key: LOG_LEVEL
        value: INFO

      - key: EXPOSE_TOKENS_IN_RESPONSES
        value: "false"

      - key: ENABLE_EMAIL_DELIVERY
        value: "true"

      - key: APP_BASE_URL
        sync: false

      - key: SMTP_HOST
        sync: false

      - key: SMTP_PORT
        sync: false

      - key: SMTP_USERNAME
        sync: false

      - key: SMTP_PASSWORD
        sync: false

      - key: SMTP_FROM_EMAIL
        sync: false

      - key: SMTP_USE_TLS
        value: "true"

      - key: SMTP_USE_SSL
        value: "false"

      - key: DATABASE_URL
        fromDatabase:
          name: placement-db
          property: connectionString

      - key: SECRET_KEY
        sync: false

      - key: JWT_SECRET_KEY
        sync: false

      - key: SESSION_SECRET_KEY
        sync: false

databases:
  - name: placement-db
    databaseName: placement_portal
    plan: free
