services:
  - type: web
    name: placement-portal
    runtime: python
    pythonVersion: 3.12
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    plan: free

    envVars:
      - key: DEBUG
        value: "false"

      - key: LOG_LEVEL
        value: INFO

      - key: EXPOSE_TOKENS_IN_RESPONSES
        value: "false"

      - key: ENABLE_EMAIL_DELIVERY
        value: "false"

databases:
  - name: placement-db
    databaseName: placement_portal
    plan: free