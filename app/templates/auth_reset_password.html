{% extends "base.html" %}
{% block title %}Reset Password{% endblock %}
{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6 col-lg-5">
        <div class="card shadow-sm">
            <div class="card-body">
                <h1 class="h4 mb-3">Reset password</h1>
                <form method="post" action="/ui/reset-password">
                    <div class="mb-3"><label class="form-label">Token</label><textarea class="form-control" name="token" rows="4" required>{{ token or '' }}</textarea></div>
                    <div class="mb-3"><label class="form-label">New password</label><input class="form-control" name="new_password" type="password" minlength="8" required></div>
                    <button class="btn btn-primary w-100" type="submit">Reset password</button>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
