{% extends "base.html" %}
{% block title %}Student Profile{% endblock %}
{% block content %}
<h1 class="h3 mb-3">Student profile</h1>
{% if student %}
<div class="card shadow-sm">
    <div class="card-body">
        <div class="row mb-3">
            <div class="col-md-4"><strong>Name:</strong> {{ student.name }}</div>
            <div class="col-md-4"><strong>Reg No:</strong> {{ student.reg_no }}</div>
            <div class="col-md-4"><strong>Roll No:</strong> {{ student.roll_no }}</div>
        </div>
        <form method="post" action="/ui/student/profile">
            <div class="row g-3">
                <div class="col-md-6"><label class="form-label">Phone</label><input class="form-control" name="phone" value="{{ student.phone or '' }}"></div>
                <div class="col-md-6"><label class="form-label">Personal Email</label><input class="form-control" name="personal_email" value="{{ student.personal_email or '' }}"></div>
                <div class="col-12"><label class="form-label">Address</label><textarea class="form-control" name="address">{{ student.address or '' }}</textarea></div>
                <div class="col-md-6"><label class="form-label">Resume URL</label><input class="form-control" name="resume_url" value="{{ student.resume_url or '' }}"></div>
                <div class="col-md-6"><label class="form-label">GitHub URL</label><input class="form-control" name="github_url" value="{{ student.github_url or '' }}"></div>
                <div class="col-md-6"><label class="form-label">LinkedIn URL</label><input class="form-control" name="linkedin_url" value="{{ student.linkedin_url or '' }}"></div>
                <div class="col-md-6"><label class="form-label">LeetCode URL</label><input class="form-control" name="leetcode_url" value="{{ student.leetcode_url or '' }}"></div>
                <div class="col-md-6"><label class="form-label">Codeforces URL</label><input class="form-control" name="codeforces_url" value="{{ student.codeforces_url or '' }}"></div>
                <div class="col-md-6"><label class="form-label">HackerRank URL</label><input class="form-control" name="hackerrank_url" value="{{ student.hackerrank_url or '' }}"></div>
                <div class="col-md-6"><label class="form-label">Portfolio URL</label><input class="form-control" name="portfolio_url" value="{{ student.portfolio_url or '' }}"></div>
                <div class="col-md-6"><label class="form-label">Other Coding URL</label><input class="form-control" name="other_coding_url" value="{{ student.other_coding_url or '' }}"></div>
            </div>
            <div class="d-flex gap-2 mt-4">
                <button class="btn btn-primary" type="submit">Save profile</button>
            </div>
        </form>
        <form method="post" action="/ui/student/delete" class="mt-3" data-confirm="Deactivate your student account?">
            <button class="btn btn-outline-danger" type="submit" data-loading-text="Deactivating...">Deactivate student account</button>
        </form>
    </div>
</div>
{% else %}
<div class="alert alert-warning">Student profile not found.</div>
{% endif %}
{% endblock %}
