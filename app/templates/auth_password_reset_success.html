{% extends "base.html" %}
{% block title %}Password Reset Successful{% endblock %}
{% block content %}
<div class="row justify-content-center">
  <div class="col-md-6 col-lg-5">
    <div class="card shadow-sm border-0">
      <div class="card-body p-4 p-md-5 text-center">
        <div class="empty-state-icon mx-auto mb-3" aria-hidden="true" style="background:#e8f5e9;color:#198754;">OK</div>
        <h1 class="h3 mb-2">Password Reset Successful</h1>
        <p class="mb-3 text-secondary">Your password has been updated successfully.</p>
        <p class="mb-4">You can now log in using your new password.</p>

        <div class="d-grid gap-2">
          <a class="btn btn-primary" href="/ui/login">Go to Login</a>
          <a class="btn btn-outline-secondary" href="/ui/forgot-password">Forgot another password?</a>
        </div>
      </div>
    </div>
  </div>
</div>
{% endblock %}
