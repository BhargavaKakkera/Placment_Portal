{% extends "base.html" %}
{% block title %}Verify Email{% endblock %}
{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6 col-lg-5">
        <div class="card shadow-sm">
            <div class="card-body">
                <h1 class="h4 mb-3">Verify email</h1>
                {% if error_message %}
                <div class="alert alert-danger" role="alert">
                    {{ error_message }}
                </div>
                {% endif %}
                <form method="post" action="/ui/verify-email">
                    <input type="hidden" name="token" value="{{ form_data.get('token', token or '') }}">
                    {% if field_errors.get('token') %}<div class="alert alert-danger" role="alert">{{ field_errors['token'] }}</div>{% endif %}
                    <button class="btn btn-primary w-100" type="submit" data-loading-text="Verifying...">Verify email</button>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
