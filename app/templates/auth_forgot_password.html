{% extends "base.html" %}
{% block title %}Forgot Password{% endblock %}
{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6 col-lg-5">
        <div class="card shadow-sm">
            <div class="card-body">
                <h1 class="h4 mb-3">Forgot password</h1>
                <form method="post" action="/ui/forgot-password">
                    <div class="mb-3"><label class="form-label">Email</label><input class="form-control" name="email" type="email" required></div>
                    <button class="btn btn-primary w-100" type="submit">Generate reset token</button>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
