{% extends "base.html" %}
{% block title %}Edit Student{% endblock %}
{% block content %}
<a class="btn btn-sm btn-outline-secondary mb-3" href="/ui/admin/students">Back to students</a>
<div class="card shadow-sm">
    <div class="card-body">
        <h1 class="h4 mb-3">Edit {{ student.name }}</h1>
        <form method="post" action="/ui/admin/students/{{ student.id }}">
            <div class="row g-3">
                <div class="col-md-6"><label class="form-label">Reg No</label><input class="form-control" name="reg_no" value="{{ student.reg_no }}"></div>
                <div class="col-md-6"><label class="form-label">Roll No</label><input class="form-control" name="roll_no" value="{{ student.roll_no }}"></div>
                <div class="col-md-4"><label class="form-label">CGPA</label><input class="form-control" name="cgpa" value="{{ student.cgpa }}" type="number" min="0" max="10" step="0.1"></div>
                <div class="col-md-4"><label class="form-label">Branch</label><select class="form-select" name="branch">{% for branch in Branch %}<option value="{{ branch.value }}" {% if student.branch == branch %}selected{% endif %}>{{ branch.value }}</option>{% endfor %}</select></div>
                <div class="col-md-4"><label class="form-label">Backlogs</label><input class="form-control" name="backlogs" value="{{ student.backlogs }}" type="number" min="0"></div>
                <div class="col-md-6"><label class="form-label">Graduation year</label><input class="form-control" name="graduation_year" value="{{ student.graduation_year }}" type="number"></div>
            </div>
            <button class="btn btn-primary mt-3" type="submit">Save changes</button>
        </form>
    </div>
</div>
{% endblock %}
